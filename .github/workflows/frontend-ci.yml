name: Frontend CI

on:
  push:
    branches: [main, dev, qa]
  pull_request:
    branches: [main, dev, qa]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Format check
        run: |
          cd frontend
          npm run format:check

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Unit tests
        run: |
          cd frontend
          npm test

      - name: Build
        run: |
          cd frontend
          npm run build
