name: Deploy to AWS

# Deploy automático a la EC2 tras merge a main.
#
# Flujo:
#   1. Backend CI + Frontend CI pasan en main → dispara este workflow
#   2. `gate`: verifica que AMBOS CI están green en el mismo SHA
#   3. `build-bundle`: git archive → S3 (versionado por SHA + latest)
#   4. `deploy`: SSM Run Command en la EC2 → rsync + docker compose up
#   5. `smoke`: cURL a /health del gateway
#
# Rollback: workflow_dispatch con `sha` = commit anterior.

on:
  workflow_run:
    workflows: ["Backend CI", "Frontend CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      sha:
        description: "SHA a deployar (vacío = HEAD de main)"
        required: false

# Un solo deploy a main a la vez; el 2do queda en cola.
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  BUNDLE_PREFIX: app
  LATEST_KEY: app/airmon-app-bundle.tar.gz
  EC2_TAG_NAME: airmon-app

jobs:
  gate:
    name: Verify CI green on SHA
    # workflow_run dispara este workflow por cada CI que termine. Si el CI que
    # disparó falló, ni entramos. Si pasó, comprobamos que el OTRO CI también.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Resolve target SHA
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ inputs.sha }}"
            if [ -z "$SHA" ]; then
              SHA=$(gh api "repos/${{ github.repository }}/commits/main" --jq .sha)
            fi
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Target SHA: $SHA"

      - name: Check Backend CI + Frontend CI both green on SHA
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — omitiendo gate de CI."
            exit 0
          fi
          SHA="${{ steps.resolve.outputs.sha }}"
          ALL_GREEN=1
          for WF in "Backend CI" "Frontend CI"; do
            CONCL=$(gh api \
              "repos/${{ github.repository }}/actions/runs?head_sha=$SHA&per_page=100" \
              --jq "[.workflow_runs[] | select(.name == \"$WF\")] | .[0].conclusion // \"missing\"")
            echo "$WF on $SHA: $CONCL"
            if [ "$CONCL" != "success" ]; then
              ALL_GREEN=0
            fi
          done
          if [ $ALL_GREEN -eq 1 ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "✓ Ambos CI green — procediendo a deploy."
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Otro CI aún no está green en $SHA. Este run no deploya (se reintentará cuando termine el otro)."
          fi

  build-bundle:
    name: Build bundle & upload to S3
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ needs.gate.outputs.sha }}
      versioned_key: ${{ steps.upload.outputs.versioned_key }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.sha }}
          # git archive necesita historia; shallow=1 basta
          fetch-depth: 1

      - name: Build tarball with git archive
        run: |
          git archive --format=tar.gz -o /tmp/airmon-bundle.tar.gz HEAD
          ls -lh /tmp/airmon-bundle.tar.gz

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3 (versioned + latest)
        id: upload
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          SHA="${{ needs.gate.outputs.sha }}"
          VERSIONED_KEY="${BUNDLE_PREFIX}/airmon-${SHA}.tar.gz"
          aws s3 cp /tmp/airmon-bundle.tar.gz "s3://${S3_BUCKET}/${VERSIONED_KEY}"
          aws s3 cp "s3://${S3_BUCKET}/${VERSIONED_KEY}" "s3://${S3_BUCKET}/${LATEST_KEY}"
          echo "versioned_key=${VERSIONED_KEY}" >> "$GITHUB_OUTPUT"
          echo "✓ s3://${S3_BUCKET}/${VERSIONED_KEY}"
          echo "✓ s3://${S3_BUCKET}/${LATEST_KEY} (latest)"

  deploy:
    name: Deploy on EC2 via SSM
    needs: build-bundle
    runs-on: ubuntu-latest
    outputs:
      public_ip: ${{ steps.ec2.outputs.public_ip }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find EC2 instance by tag
        id: ec2
        run: |
          RESULT=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${EC2_TAG_NAME}" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].[InstanceId,PublicIpAddress]' \
            --output text)
          INSTANCE_ID=$(echo "$RESULT" | awk '{print $1}')
          PUBLIC_IP=$(echo "$RESULT" | awk '{print $2}')
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::No hay EC2 running con tag Name=${EC2_TAG_NAME}"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "EC2: $INSTANCE_ID @ $PUBLIC_IP"

      - name: Send SSM command
        id: ssm
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          SHA="${{ needs.build-bundle.outputs.sha }}"
          INSTANCE_ID="${{ steps.ec2.outputs.instance_id }}"

          # Comandos que corren en la EC2 como root (SSM default).
          # Baja el bundle, extrae a /tmp/airmon-stage, invoca el script de deploy
          # que vive DENTRO del bundle (scripts/aws-remote-deploy.sh).
          # Un solo string con newlines — SSM lo ejecuta con `bash -c`.
          REMOTE_SCRIPT=$(cat <<EOF
          set -euxo pipefail
          STAGE=/tmp/airmon-stage
          rm -rf \$STAGE && mkdir -p \$STAGE
          aws s3 cp s3://${S3_BUCKET}/${LATEST_KEY} /tmp/app-bundle.tar.gz --region ${AWS_REGION}
          tar -xzf /tmp/app-bundle.tar.gz -C \$STAGE
          chmod +x \$STAGE/scripts/aws-remote-deploy.sh
          \$STAGE/scripts/aws-remote-deploy.sh \$STAGE ${AWS_REGION} ${S3_BUCKET}
          EOF
          )

          # Construir el JSON de --parameters con jq (safe contra newlines/quotes).
          PARAMS=$(jq -n --arg cmd "$REMOTE_SCRIPT" '{commands: [$cmd]}')

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "airmon deploy ${SHA:0:8}" \
            --parameters "$PARAMS" \
            --cloud-watch-output-config "CloudWatchOutputEnabled=true" \
            --query 'Command.CommandId' --output text)
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "SSM Command ID: $CMD_ID"

      - name: Wait for SSM command to finish
        env:
          CMD_ID: ${{ steps.ssm.outputs.cmd_id }}
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          # `wait command-executed` hace polling con backoff; timeout total ~10min.
          if ! aws ssm wait command-executed \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID"; then
            echo "::error::SSM command falló"
            echo "---- STDOUT ----"
            aws ssm get-command-invocation --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' --output text || true
            echo "---- STDERR ----"
            aws ssm get-command-invocation --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' --output text || true
            exit 1
          fi
          echo "✓ Deploy remoto OK"
          aws ssm get-command-invocation --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text | tail -40

  smoke:
    name: Smoke test /health
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: cURL gateway health
        env:
          IP: ${{ needs.deploy.outputs.public_ip }}
        run: |
          echo "GET http://${IP}:8000/health"
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 "http://${IP}:8000/health" -o /tmp/h.json; then
              cat /tmp/h.json; echo
              echo "✓ Gateway healthy tras $i intentos"
              exit 0
            fi
            echo "  intento $i/30 — esperando 10s (rebuild de imagen en curso)"
            sleep 10
          done
          echo "::error::/health no respondió 200 en 5 min"
          exit 1
