sonar.projectKey=the-eagle-eye_air-monitoring-web
sonar.organization=the-eagle-eye
sonar.sourceEncoding=UTF-8

sonar.sources=frontend/src,services/api-gateway/app,services/iot-service/app,services/ml-service/app,services/ops-service/app
sonar.tests=frontend/src,frontend/e2e,services/api-gateway/tests,services/iot-service/tests,services/ml-service/tests,services/ops-service/tests
sonar.test.inclusions=frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx,frontend/e2e/**,services/**/tests/**

sonar.python.version=3.11
sonar.python.coverage.reportPaths=services/api-gateway/coverage.xml,services/iot-service/coverage.xml,services/ml-service/coverage.xml,services/ops-service/coverage.xml
