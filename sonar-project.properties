sonar.exclusions=**/*.d.ts,**/next-env.d.ts,frontend/.next/**,frontend/coverage/**,frontend/node_modules/**,frontend/playwright-report/**,frontend/test-results/**,frontend/public/**,**/*.ico,**/*.png,**/*.jpg,**/*.jpeg,**/*.gif,**/*.svg,**/*.woff,**/*.woff2,**/migrations/**,**/*.pyc,**/__pycache__/**,**/alembic/versions/**,services/ml-service/ml_artifacts_ensemble_v1/**,services/ml-service/scripts/**

sonar.coverage.exclusions=**/*.test.*,frontend/e2e/**,frontend/jest.config.mjs,frontend/jest.setup.ts,frontend/next.config.*,frontend/postcss.config.*,frontend/tailwind.config.*,**/migrations/**,**/tests/**,**/alembic/**,services/ml-service/scripts/**
