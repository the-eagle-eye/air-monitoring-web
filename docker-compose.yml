services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: airmon
      POSTGRES_PASSWORD: airmon123
      POSTGRES_DB: airmonitoring
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airmon -d airmonitoring"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://airmon:airmon123@db:5432/airmonitoring
      - IOT_SERVICE_URL=http://iot-service:8001
      - ML_SERVICE_URL=http://ml-service:8002
      - ML_ISOLATION_SERVICE_URL=http://ml-service-isolation:8004
      - ML_BACKEND=${ML_BACKEND:-legacy}
      - OPS_SERVICE_URL=http://ops-service:8003
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./services/api-gateway/app:/app/app

  iot-service:
    build:
      context: .
      dockerfile: services/iot-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://airmon:airmon123@db:5432/airmonitoring
      - IOT_SERVICE_URL=http://iot-service:8001
      - ML_SERVICE_URL=http://ml-service:8002
      - OPS_SERVICE_URL=http://ops-service:8003
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./services/iot-service/app:/app/app
      - ./services/iot-service/migrations:/app/migrations
      - ./services/iot-service/alembic.ini:/app/alembic.ini
      - ./services/iot-service/tests:/app/tests

  ml-service:
    build:
      context: .
      dockerfile: services/ml-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://airmon:airmon123@db:5432/airmonitoring
      - IOT_SERVICE_URL=http://iot-service:8001
      - ML_SERVICE_URL=http://ml-service:8002
      - OPS_SERVICE_URL=http://ops-service:8003
      - ENSEMBLE_ARTIFACTS_PATH=/app/ml_artifacts_ensemble_v1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./services/ml-service/app:/app/app
      - ./services/ml-service/ml_artifacts_ensemble_v1:/app/ml_artifacts_ensemble_v1
      - ./services/ml-service/scripts:/app/scripts
      - ./services/ml-proposal/dataset:/app/dataset_ensemble:ro
      - ./services/ml-service/migrations:/app/migrations
      - ./services/ml-service/alembic.ini:/app/alembic.ini
      - ./services/ml-service/tests:/app/tests

  ml-service-isolation:
    build:
      context: .
      dockerfile: services/ml-service-isolation/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://airmon:airmon123@db:5432/airmonitoring
      - IOT_SERVICE_URL=http://iot-service:8001
      - OPS_SERVICE_URL=http://ops-service:8003
      - ML_ARTIFACTS_V3_PATH=/app/ml_artifacts_v3
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./services/ml-service-isolation/app:/app/app
      - ./services/ml-service-isolation/ml_artifacts_v3:/app/ml_artifacts_v3
      - ./services/ml-service-isolation/migrations:/app/migrations
      - ./services/ml-service-isolation/alembic.ini:/app/alembic.ini
      - ./services/ml-service-isolation/tests:/app/tests

  ops-service:
    build:
      context: .
      dockerfile: services/ops-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://airmon:airmon123@db:5432/airmonitoring
      - IOT_SERVICE_URL=http://iot-service:8001
      - ML_SERVICE_URL=http://ml-service:8002
      - OPS_SERVICE_URL=http://ops-service:8003
      - SMTP_HOST=sandbox.smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=09517cce65c3b6
      - SMTP_PASSWORD=f593f36fea927e
      - SMTP_FROM=noreply@airmonitoring.oefa.gob.pe
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./services/ops-service/app:/app/app
      - ./services/ops-service/migrations:/app/migrations
      - ./services/ops-service/alembic.ini:/app/alembic.ini

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_GATEWAY_URL=http://localhost:8000
      - NEXT_PUBLIC_IOT_SERVICE_URL=http://localhost:8001
      - NEXT_PUBLIC_ML_SERVICE_URL=http://localhost:8002
      - NEXT_PUBLIC_OPS_SERVICE_URL=http://localhost:8003
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  pgdata:
